<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Page</title>
</head>
<body>

    <!-- Heading -->
    <h1>Welcome to My Page</h1>

    <!-- Paragraph -->
    <p>This is a sample webpage created using HTML.</p>

    <!-- Text Formatting -->
    <h2>Text Formatting</h2>

    <p><b>Bold text.</b></p>
    <p><small>Small text.</small></p>
    <p><pre>Preformatted text.</pre></p>
    <p><i>Italic text.</i></p>
    <p><u>Underlined text.</u></p>
    <p><s>Strikethrough text.</s></p>
    <p><em>Emphasized text.</em></p>
    <p><strong>Bold and emphasized text.</strong></p>

</body>
</html>
